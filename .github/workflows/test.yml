name: CI Pipeline - Test Web-Application

on:
  push:
    branches: [ main, 'feature/*' ]
  pull_request:
    branches: [ main, 'feature/*' ]

jobs:
  backend-test:
    name: Backend Health Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install
        
      - name: Install test dependencies
        working-directory: ./backend
        run: npm install --save-dev vitest @vitest/coverage-v8
        
      - name: Run health tests
        working-directory: ./backend
        run: npm test
        
      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: ./backend/coverage/
          
  frontend-build:
    name: Frontend Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install
        
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker images
        run: docker compose build
        
      - name: Run Docker containers
        run: |
          docker compose up -d
          sleep 10
          
      - name: Test health endpoints
        run: |
          # Test backend health endpoint
          curl -f http://localhost:3000/api/health || exit 1
          curl -f http://localhost:3000/api/health/live || exit 1
          curl -f http://localhost:3000/api/health/ready || exit 1
          
      - name: Clean up
        if: always()
        run: docker compose down